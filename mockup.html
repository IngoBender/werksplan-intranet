<!DOCTYPE html><html lang="de"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Werksplan — Mockup ~96 Anlagen</title>
<style>
 :root{--legacy:#143439;--bright:#46B384;--graphite:#567E84;--bg:#0e1a1c;--panel:#12262a;--panel2:#0f2023;--line:#1e3a3f;--txt:#eaf2f0;--muted:#8fa9a8;--flow:linear-gradient(-56deg,#567E84,#46B384);}
 *{box-sizing:border-box;margin:0;padding:0;} body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt);}
 header{background:var(--legacy);border-bottom:1px solid var(--line);} .hbar{height:4px;background:var(--flow);}
 .htop{padding:14px 24px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
 h1{font-size:18px;font-weight:700;display:flex;gap:10px;align-items:center;} .logo{width:28px;height:28px;border-radius:7px;background:var(--flow);display:flex;align-items:center;justify-content:center;}
 .sub{font-size:12px;color:#9fc4bd;}
 .modeswitch{margin-left:auto;display:flex;gap:4px;background:var(--panel2);padding:4px;border-radius:10px;}
 .modeswitch button{background:none;border:none;color:var(--muted);padding:7px 16px;border-radius:7px;font-size:13px;cursor:pointer;font-weight:600;}
 .modeswitch button.active{background:var(--bright);color:#08210f;}
 .kpis{display:flex;gap:12px;padding:14px 24px;background:var(--panel2);border-bottom:1px solid var(--line);flex-wrap:wrap;}
 .kpi{flex:1;min-width:130px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 15px;position:relative;overflow:hidden;}
 .kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--bright);} .kpi.w::before{background:#f5a623;} .kpi.c::before{background:#e0574a;}
 .kpi .n{font-size:24px;font-weight:750;} .kpi .l{font-size:11px;color:var(--muted);margin-top:5px;text-transform:uppercase;letter-spacing:.4px;}
 /* KARTE */
 #mapview .wrap{margin:18px 24px;position:relative;overflow:hidden;border:1px solid var(--line);border-radius:14px;}
 .planbox{position:relative;width:100%;background:#fff;transform-origin:0 0;transition:transform .55s cubic-bezier(.4,0,.2,1);} .planbox img{width:100%;display:block;}
 .halle{position:absolute;border:2px solid var(--graphite);border-radius:8px;background:rgba(86,126,132,.14);cursor:pointer;transition:.15s;}
 .halle:hover{background:rgba(70,179,132,.24);border-color:var(--bright);box-shadow:0 0 0 3px rgba(70,179,132,.3);}
 .halle .hcard{position:absolute;top:6px;left:6px;right:6px;}
 .halle .hl{font-size:12px;font-weight:700;color:#fff;background:var(--legacy);padding:3px 8px;border-radius:5px;display:inline-block;}
 .halle .hstat{margin-top:4px;display:flex;gap:4px;flex-wrap:wrap;}
 .halle .pill{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;color:#fff;}
 .hallelayer.hidden .halle{display:none;}
 .zone{position:absolute;border:2px solid;border-radius:6px;cursor:pointer;background:rgba(255,255,255,.03);transition:.12s;}
 .zone:hover{background:rgba(70,179,132,.2);box-shadow:0 0 0 3px rgba(70,179,132,.35);z-index:5;}
 .zone .tag{position:absolute;top:-9px;left:-2px;font-size:9px;font-weight:700;padding:1px 6px;border-radius:5px;color:#fff;white-space:nowrap;}
 .zone .sdot{position:absolute;top:3px;right:3px;width:9px;height:9px;border-radius:50%;border:2px solid #fff;}
 .zone.hidden{display:none;}
 #backbtn{display:none;margin:0 24px;background:var(--graphite);color:#fff;border:none;padding:8px 16px;border-radius:8px;font-weight:600;cursor:pointer;}
 .hint{margin:10px 24px;color:var(--muted);font-size:13px;}
 /* LISTE */
 #listview{display:none;padding:18px 24px;}
 .filters{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
 .filters select,.filters input{background:var(--panel);border:1px solid var(--line);color:var(--txt);padding:8px 12px;border-radius:8px;font-size:13px;}
 table{width:100%;border-collapse:collapse;background:var(--panel);border-radius:12px;overflow:hidden;}
 th,td{padding:11px 14px;text-align:left;font-size:13px;border-bottom:1px solid var(--line);}
 th{background:var(--legacy);color:#cfe3df;font-size:11px;text-transform:uppercase;letter-spacing:.4px;cursor:pointer;user-select:none;}
 th:hover{color:var(--bright);} tr:hover td{background:var(--panel2);}
 .badge{font-size:11px;font-weight:700;padding:2px 9px;border-radius:10px;color:#fff;}
 .clr{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:6px;}
 .foot{padding:12px 24px 28px;font-size:11px;color:#5c7975;}
</style></head><body>
<header><div class="hbar"></div><div class="htop">
 <div><h1><span class="logo">🏭</span> Werksplan Hagener Feinstahl</h1><div class="sub">MOCKUP · 96 Anlagen (simuliert) · zeigt die neue Interaktion</div></div>

</div></header>
<div class="kpis" id="kpis"></div>
